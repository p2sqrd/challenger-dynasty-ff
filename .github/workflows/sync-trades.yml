name: Sync trades from Sleeper

# Pulls new completed trades from Sleeper on a schedule so they show up without
# anyone clicking "Sync from Sleeper". Reuses the same CRON_SECRET repo secret
# as the reminders workflow.
on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours (offset off the hour)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trade sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS "https://challenger-dynasty-ff.vercel.app/api/cron/sync-trades" \
            -H "Authorization: Bearer ${CRON_SECRET}"
